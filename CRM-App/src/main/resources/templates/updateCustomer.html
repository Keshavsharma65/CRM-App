<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Customer</title>

    <style>

        body {
            background: #f4f7fc;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: orange;
            color: white;
            cursor: pointer;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Update Customer</h1>

    <form th:action="@{/updatesave}" th:object="${customer}" method="post">
        <input type="hidden" th:field="*{id}">

        <input type="text"
               th:field="*{firstName}">

        <input type="text"
               th:field="*{lastName}">

        <input type="email"
               th:field="*{email}">

        <input type="text"
               th:field="*{phoneNumber}">

        <button type="submit">
            Update Customer
        </button>

    </form>

</div>

</body>
</html>
