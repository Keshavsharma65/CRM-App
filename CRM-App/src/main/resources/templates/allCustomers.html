<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CRM Dashboard</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(
                    135deg,
                    #667eea 0%,
                    #764ba2 50%,
                    #6b73ff 100%
            );
            padding: 40px;
            overflow-x: hidden;
        }

        /* Floating Background */
        body::before {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            top: -150px;
            left: -150px;
            animation: float 8s infinite ease-in-out;
        }

        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            bottom: -100px;
            right: -100px;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(25px);
            }
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            animation: slideUp 1s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .title {
            color: white;
        }

        .title h1 {
            font-size: 42px;
            font-weight: 700;
        }

        .title p {
            opacity: .8;
            margin-top: 8px;
            color: white;
        }

        .add-btn {
            text-decoration: none;
            padding: 15px 28px;
            border-radius: 50px;
            background: linear-gradient(
                    45deg,
                    #00c853,
                    #64dd17
            );
            color: white;
            font-weight: 700;
            letter-spacing: .5px;
            transition: .4s;
            box-shadow: 0 10px 20px rgba(0, 200, 83, .35);
        }

        .add-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 200, 83, .5);
        }

        .table-container {
            overflow: hidden;
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(
                    90deg,
                    #4f46e5,
                    #7c3aed
            );
        }

        th {
            color: white;
            padding: 20px;
            font-size: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        td {
            padding: 18px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            transition: .3s;
        }

        tbody tr {
            transition: .3s;
        }

        tbody tr:hover {
            background: #f5f7ff;
            transform: scale(1.01);
        }

        tbody tr:hover td {
            color: #4f46e5;
        }

        .edit,
        .delete {
            text-decoration: none;
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            transition: .3s;
            display: inline-block;
        }

        .edit {
            background: linear-gradient(
                    45deg,
                    #ff9800,
                    #ff5722
            );
        }

        .edit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 152, 0, .4);
        }

        .delete {
            background: linear-gradient(
                    45deg,
                    #ff1744,
                    #d50000
            );
        }

        .delete:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 23, 68, .4);
        }

        .stats {
            display: grid;
            grid-template-columns:repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            color: white;
            transition: .4s;
        }

        .stat-card:hover {
            transform: translateY(-8px);
        }

        .stat-card h2 {
            font-size: 30px;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: .85;
        }

        @media (max-width: 900px) {

            .header {
                flex-direction: column;
                gap: 20px;
            }

            .stats {
                grid-template-columns:1fr;
            }

            table {
                font-size: 13px;
            }

            th, td {
                padding: 12px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="stats">

        <div class="stat-card">
            <h2 th:text="${#lists.size(customers)}">0</h2>
            <p>Total Customers</p>
        </div>

        <div class="stat-card">
            <h2>CRM</h2>
            <p>Management System</p>
        </div>

        <div class="stat-card">
            <h2>2026</h2>
            <p>Active Dashboard</p>
        </div>

    </div>

    <div class="dashboard-card">

        <div class="header">

            <div class="title">
                <h1>Customer Dashboard</h1>
                <p>Manage your customer records efficiently</p>
            </div>

            <a th:href="@{/add}" class="add-btn">
                ➕ Add Customer
            </a>

        </div>

        <div class="table-container">

            <table>

                <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Phone Number</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="customer : ${customers}">

                    <td th:text="${customer.id}"></td>
                    <td th:text="${customer.firstName}"></td>
                    <td th:text="${customer.lastName}"></td>
                    <td th:text="${customer.email}"></td>
                    <td th:text="${customer.phoneNumber}"></td>

                    <td>

                        <a class="edit"
                           th:href="@{/update/{id}(id=${customer.id})}">
                            Edit
                        </a>

                        <a class="delete"
                           th:href="@{/delete/{id}(id=${customer.id})}"
                           onclick="return confirm('Delete this customer?')">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
